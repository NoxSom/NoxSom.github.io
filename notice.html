<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告 | NoxSom</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #ffcfe8 0%, #e0c8ff 50%, #f8d8f0 100%);
            min-height: 100vh;
            background-attachment: fixed;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255,255,255,0.3) 0%, transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(230,210,255,0.4) 0%, transparent 40%),
                linear-gradient(135deg, #ffcfe8 0%, #e0c8ff 50%, #f8d8f0 100%);
        }
        nav {
            width: 100%;
            padding: 25px 0;
            text-align: center;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(8px);
            box-shadow: 0 2px 15px rgba(180,140,220,0.2);
        }
        nav a {
            color: #7a4b8e;
            text-decoration: none;
            margin: 0 18px;
            font-size: 17px;
            font-weight: 500;
            transition: all 0.3s;
        }
        nav a:hover {
            color: #b878c9;
            text-shadow: 0 0 8px rgba(210,160,240,0.6);
        }
        .container {
            width: 90%;
            max-width: 900px;
            margin: 80px auto 0;
            padding: 60px 40px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 
                0 8px 32px rgba(190,150,230,0.25),
                inset 0 0 20px rgba(255,255,255,0.3);
        }
        h1 {
            font-size: 48px;
            color: #6b3b80;
            letter-spacing: 6px;
            text-shadow: 0 2px 10px rgba(180,130,220,0.4);
            margin-bottom: 40px;
            text-align: center;
        }
        /* 公告列表样式 */
        .notice-item {
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(6px);
            border-radius: 16px;
            padding: 25px 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.4);
            transition: all 0.3s ease;
        }
        .notice-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(180,140,220,0.3);
        }
        .notice-date {
            font-size: 14px;
            color: #a074b5;
            margin-bottom: 10px;
        }
        .notice-title {
            font-size: 22px;
            color: #6b3b80;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .notice-content {
            font-size: 16px;
            color: #8c5b9e;
            line-height: 1.8;
        }
        .line {
            width: 80%;
            height: 1px;
            margin: 30px auto;
            background: linear-gradient(to right, transparent, #c8a8e0, transparent);
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">首页</a>
        <a href="notice.html">公告</a>
        <a href="member.html">艺人动态</a>
        <a href="work.html">作品</a>
    </nav>

    <div class="container">
        <h1>官方公告专区</h1>

        <!-- 公告1 -->
        <div class="notice-item">
            <div class="notice-date">2026.05.13 | 官方发布</div>
            <div class="notice-title">NoxSom 官方网站正式上线</div>
            <div class="notice-content">
                欢迎进入 NoxSom 梦核时空官方站点，本站包含首页、公告、成员介绍、作品展示四大板块。
                后续团体资讯、成员动态、新歌发布、企划活动都将在此第一时间更新，请多多期待。
            </div>
        </div>

        <!-- 分割线 -->
        <div class="line"></div>

        <!-- 公告2 -->
        <div class="notice-item">
            <div class="notice-date">2026.05.13 | 企划通知</div>
            <div class="notice-title">多重梦境世界观企划筹备中</div>
            <div class="notice-content">
                时空闭环、梦境嵌套、轮回叙事世界观正在完善搭建，后续会陆续释出成员人设、故事设定与视觉概念，
                敬请等待官方后续公告更新。
            </div>
        </div>

        <!-- 分割线 -->
        <div class="line"></div>

        <!-- 公告3 -->
        <div class="notice-item">
            <div class="notice-date">待更新 | 预告</div>
            <div class="notice-title">新歌及视觉MV制作筹备</div>
            <div class="notice-content">
                像素风梦核MV、全新单曲企划已列入制作计划，完成后将在作品页面同步上架发布。
            </div>
        </div>

    </div>
</body>
</html>
