        * {

        body {
            background: linear-gradient(135deg, #ffcfe8 0%, #e0c8ff 50%, #f8d8f0 100%);
            min-height: 100vh;
            background-attachment: fixed;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255,255,255,0.3) 0%, transparent 30%),

        }

        nav a:hover {
            color: #b878c9;

        }
        .container {
            width: 90%;
            max-width: 900px;
            margin: 80px auto 0;
            text-align: center;
            padding: 60px 40px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 
                0 8px 32px rgba(190,150,230,0.25),
                inset 0 0 20px rgba(255,255,255,0.3);
        }
        h1 {
            font-size: 48px;
            color: #6b3b80;
            letter-spacing: 6px;
            text-shadow: 0 2px 10px rgba(180,130,220,0.4);
            margin-bottom: 15px;
