<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品 | NoxSom</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            opacity: 0;
            animation: fadeIn 1.2s ease forwards;
            background: linear-gradient(135deg, #ffcfe8 0%, #e0c8ff 50%, #f8d8f0 100%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        /* 全局滚动条美化 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #c8a6e5; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.2); }

        /* 顶部导航栏美化 */
        nav#mainNav {
            width: 100%;
            padding: 28px 0;
            text-align: center;
            background: rgba(255,255,255,0.28);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 3px 20px rgba(180,140,220,0.25);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 999;
            transition: transform 0.4s ease, background 0.3s ease;
        }
        nav.nav-hide {
            transform: translateY(-100%);
        }
        nav#mainNav:hover {
            background: rgba(255,255,255,0.35);
        }
        nav a {
            color: #7a4b8e;
            text-decoration: none;
            margin: 0 22px;
            font-size: 17px;
            font-weight: 550;
            transition: all 0.35s ease;
            position: relative;
        }
        nav a::after {
            content: '';
            width: 0;
            height: 2px;
            background: #b878c9;
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 2px;
            transition: 0.3s ease;
        }
        nav a:hover {
            color: #b878c9;
            text-shadow: 0 0 10px rgba(210,160,240,0.7);
            letter-spacing: 2px;
        }
        nav a:hover::after {
            width: 100%;
        }
        /* 主容器美化 */
        .container {
            width: 92%;
            max-width: 1100px;
            margin: 130px auto 80px;
            padding: 50px 35px;
            background: rgba(255,255,255,0.22);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 6px 30px rgba(165,125,210,0.18);
            position: relative;
            overflow: hidden;
        }
        /* 容器流光效果 */
        .container::before {
            content: "";
            position: absolute;
            top: -150%;
            left: -150%;
            width: 400%;
            height: 400%;
            background: radial-gradient(circle, rgba(220,180,255,0.15) 0%, transparent 60%);
            animation: streamLight 8s linear infinite;
        }
        @keyframes streamLight {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            font-size: 44px;
            background: linear-gradient(135deg, #80489c, #b878c9);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 50px;
            letter-spacing: 3px;
            text-shadow: 0 2px 8px rgba(107,59,128,0.15);
            position: relative;
            z-index: 2;
        }
        /* 专辑布局 */
        .album-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            flex-wrap: nowrap;
        }
        .album-left {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }
        /* 圆形封面 可点击 */
        .circle-cover {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 8px 25px rgba(150,110,200,0.3);
            transition: all 0.4s ease;
            border: 8px solid rgba(255,255,255,0.35);
            cursor: pointer;
            user-select: none;
        }
        .circle-cover:hover {
            transform: scale(1.05) rotate(8deg);
            box-shadow: 0 12px 35px rgba(150,110,200,0.45);
        }
        .album-title {
            font-size: 24px;
            color: #6b3b80;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .mv-btn {
            display:inline-block;
            padding:12px 32px;
            background:linear-gradient(135deg, rgba(230,122,255,0.3), rgba(180,100,255,0.3));
            backdrop-filter:blur(12px);
            -webkit-backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.45);
            color:#fff;
            border-radius:15px;
            text-decoration:none;
            font-weight:550;
            letter-spacing:1.5px;
            box-shadow: 0 5px 20px rgba(180,100,255,0.25);
            transition: all 0.3s ease;
        }
        .mv-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(180,100,255,0.35);
            background:linear-gradient(135deg, rgba(230,122,255,0.4), rgba(180,100,255,0.4));
        }

        /* 歌曲弹窗遮罩 */
        .song-mask{
            position: fixed;
            inset:0;
            background:rgba(0,0,0,0.4);
            backdrop-filter: blur(6px);
            z-index:1000;
            display:none;
            align-items:center;
            justify-content:center;
            padding:20px;
        }
        .song-mask.show{
            display:flex;
        }
        /* 歌曲弹窗盒子 */
        .song-popup{
            width: 700px;
            max-height: 85vh;
            overflow-y:auto;
            background:rgba(255,255,255,0.3);
            backdrop-filter: blur(18px);
            border-radius:25px;
            padding:30px;
            border:1px solid rgba(255,255,255,0.5);
            box-shadow:0 10px 40px #b894e860;
        }
        .close-pop{
            text-align:right;
            margin-bottom:20px;
        }
        .close-btn{
            background:#b894e8;
            color:#fff;
            border:none;
            width:36px;
            height:36px;
            border-radius:50%;
            font-size:18px;
            cursor:pointer;
        }
        .song-item {
            margin: 25px 0;
            animation: songFade 0.5s ease forwards;
        }
        @keyframes songFade {
            from{opacity:0;transform: translateY(15px);}
            to{opacity:1;transform: translateY(0);}
        }
        .song-name {
            color: #7a4b8e;
            margin-bottom: 12px;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        /* 播放器样式 */
        .custom-audio {
            width: 100%;
            background: linear-gradient(135deg, rgba(248,216,240,0.7), rgba(224,200,255,0.7));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 18px 22px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(170,130,210,0.2);
            border: 1px solid rgba(255,255,255,0.35);
            position: relative;
        }
        .custom-audio::before{
            content:"";
            position:absolute;
            inset:0;
            border-radius:28px;
            box-shadow: 0 0 15px rgba(184,148,232,0.3);
            animation: breathe 3s ease-in-out infinite;
        }
        @keyframes breathe{
            0%,100%{opacity:0.5;}
            50%{opacity:0.9;}
        }
        .player-top {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            z-index:2;
        }
        .play-btn {
            background: linear-gradient(135deg, #c7a0f0, #b894e8);
            border: none;
            color: #fff;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            flex-shrink: 0;
            box-shadow: 0 3px 12px rgba(184,148,232,0.4);
            transition: all 0.3s ease;
        }
        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 18px rgba(184,148,232,0.5);
        }
        .progress-wrap {
            flex: 1;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.5);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            height: 6px;
            background: linear-gradient(90deg, #e8a8e0, #b894e8);
            border-radius: 10px;
            width: 0%;
            transition: width 0.1s linear;
        }
        .time-text {
            color: #6b3b80;
            font-size: 13px;
            margin-top: 6px;
            text-align: right;
            font-weight: 500;
        }
        .player-controls {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            align-items: center;
            position: relative;
            z-index:2;
        }
        .speed-select {
            background:rgba(255,255,255,0.4);
            border:1px solid rgba(255,255,255,0.5);
            color:#6b3b80;
            border-radius:10px;
            padding:6px 9px;
            outline:none;
            font-size:13px;
            cursor: pointer;
            transition: 0.3s;
        }
        .speed-select:hover {
            background:rgba(255,255,255,0.55);
        }
        .down-btn {
            background:linear-gradient(135deg, rgba(198,165,240,0.5), rgba(184,148,232,0.5));
            border:none;
            color:#fff;
            padding:6px 14px;
            border-radius:10px;
            cursor:pointer;
            font-size:13px;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .down-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(184,148,232,0.35);
        }
        /* 禁止移动端样式改动 全端统一 */
        @media (max-width:768px){
            nav a {margin:0 22px;font-size:17px;}
            .container {padding:50px 35px;margin:130px auto 80px;}
            h1 {font-size:44px;}
            .circle-cover {width:260px;height:260px;}
            .song-popup{width:95%;}
        }
    </style>
</head>
<body>
    <nav id="mainNav">
        <a href="index.html">首页</a>
        <a href="notice.html">公告</a>
        <a href="member.html">艺人动态</a>
        <a href="work.html">作品</a>
    </nav>

    <div class="container">
        <h1>作品专区</h1>
        <div class="album-wrap">
            <div class="album-left">
                <img class="circle-cover" src="https://raw.githubusercontent.com/NoxSom/NoxSom.github.io/020d2633aab03f4088c084cabb051793d8f34d7b/%E4%B8%93%E8%BE%911/%E6%97%A0%E6%A0%87%E9%A2%9869.png">

<script>
// 导航隐藏
const mainNav = document.getElementById('mainNav');
let lastScrollY = 0;
window.addEventListener('scroll', () => {
    let currentScrollY = window.scrollY;
    mainNav.classList.toggle('nav-hide', currentScrollY > lastScrollY && currentScrollY > 50);
    lastScrollY = currentScrollY;
});

// 弹窗开关 百分百可用
const cover = document.querySelector('.circle-cover');
const mask = document.getElementById('songMask');
const closeBtn = document.getElementById('closePop');

cover.onclick = function(){
    mask.classList.add('show');
};
closeBtn.onclick = function(){
    mask.classList.remove('show');
};
mask.onclick = function(e){
    if(e.target === this) mask.classList.remove('show');
};

// 时间格式化
function formatTime(s){
    if(isNaN(s)) return "00:00 / 00:00";
    let m = Math.floor(s/60),sec=Math.floor(s%60);
    return `${m<10?'0'+m:m}:${sec<10?'0'+sec:sec}`;
}

// 播放器逻辑
document.querySelectorAll('.play-btn').forEach(btn=>{
    let audio = new Audio();
    let wrap = btn.closest('.custom-audio');
    let bar = wrap.querySelector('.progress-bar');
    let fill = wrap.querySelector('.progress-fill');
    let timeTxt = wrap.querySelector('.time-text');
    let speedSel = wrap.querySelector('.speed-select');
    let playing = false;

    speedSel.onchange = ()=>audio.playbackRate = +speedSel.value;

    btn.onclick = function(){
        if(!playing){
            audio.src = this.dataset.src;
            audio.playbackRate = +speedSel.value;
            audio.play();
            this.innerText = '■';
            playing = true;
        }else{
            audio.pause();
            this.innerText = '▶';
            playing = false;
        }
    };

    audio.ontimeupdate = ()=>{
        if(audio.duration){
            fill.style.width = (audio.currentTime/audio.duration)*100 + '%';
            timeTxt.innerText = formatTime(audio.currentTime)+' / '+formatTime(audio.duration);
        }
    };

    bar.onclick = e=>{
        if(!audio.duration)return;
        let rect = bar.getBoundingClientRect();
        let pos = (e.clientX - rect.left)/rect.width;
        audio.currentTime = pos * audio.duration;
    };

    audio.onended = ()=>{
        btn.innerText='▶';playing=false;fill.style.width='0%';
    };
    document.addEventListener('visibilitychange',()=>{
        if(document.hidden){audio.pause();btn.innerText='▶';playing=false;}
    });
});
</script>
