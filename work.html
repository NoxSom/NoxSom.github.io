<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品 | NoxSom</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        :root {
            --main-purple: #7a4b8e;
            --light-purple: #b878c9;
            --bg-grad-1: #ffcfe8;
            --bg-grad-2: #e0c8ff;
            --bg-grad-3: #f8d8f0;
            --glass-white: rgba(255,255,255,0.25);
            --glass-deep: rgba(255,255,255,0.35);
        }
        body {
            opacity: 0;
            animation: pageFadeIn 1.2s ease forwards;
            background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 50%, var(--bg-grad-3) 100%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            transition: all 0.3s ease;
        }
        @keyframes pageFadeIn {
            to { opacity: 1; }
        }
        .float-particle {
            position: fixed;
            border-radius: 50%;
            background: rgba(184,120,201,0.25);
            filter: blur(6px);
            pointer-events: none;
            z-index: 0;
            animation: floatMove 12s ease-in-out infinite;
        }
        @keyframes floatMove {
            0%,100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(180deg); }
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #c8a6e5; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.2); }

        nav#mainNav {
            width: 100%;
            padding: 24px 0;
            text-align: center;
            background: var(--glass-white);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 4px 25px rgba(180,140,220,0.28);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 999;
            transition: transform 0.5s cubic-bezier(0.2,0.8,0.2,1), background 0.4s ease;
        }
        nav.nav-hide {
            transform: translateY(-100%);
        }
        nav#mainNav:hover {
            background: var(--glass-deep);
        }
        nav a {
            color: var(--main-purple);
            text-decoration: none;
            margin: 0 24px;
            font-size: 17px;
            font-weight: 550;
            transition: all 0.4s cubic-bezier(0.2,0.8,0.2,1);
            position: relative;
            display: inline-block;
        }
        nav a::after {
            content: '';
            width: 0;
            height: 2px;
            background: var(--light-purple);
            position: absolute;
            bottom: -6px;
            left: 0;
            border-radius: 2px;
            transition: 0.4s ease;
        }
        nav a:hover {
            color: var(--light-purple);
            text-shadow: 0 0 12px rgba(210,160,240,0.75);
            letter-spacing: 2px;
            transform: translateY(-3px);
        }
        nav a:hover::after {
            width: 100%;
        }
        .main-wrap {
            width: 94%;
            max-width: 1100px;
            margin: 140px auto 100px;
            position: relative;
            z-index: 2;
        }
        .page-title-box {
            text-align: center;
            margin-bottom: 60px;
            animation: titleSlide 1s ease-out;
        }
        @keyframes titleSlide {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            font-size: 46px;
            background: linear-gradient(135deg, #80489c, var(--light-purple));
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 4px;
            position: relative;
        }
        .title-desc {
            color: var(--main-purple);
            margin-top: 12px;
            font-size: 15px;
            opacity: 0.8;
        }
        .album-container {
            display: grid;
            gap: 35px;
        }
        .album-card {
            background: var(--glass-white);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.4);
            padding: 40px;
            box-shadow: 0 8px 35px rgba(165,125,210,0.2);
            transition: all 0.5s cubic-bezier(0.2,0.8,0.2,1);
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .album-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: -120%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
            transition: left 0.7s ease;
        }
        .album-card:hover::before {
            left: 120%;
        }
        .album-card:hover {
            transform: translateY(-10px) scale(1.02) rotateX(2deg);
            box-shadow: 0 18px 50px rgba(180,140,220,0.38);
            background: var(--glass-deep);
        }
        .album-inner {
            display: flex;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }
        .album-cover-box {
            flex-shrink: 0;
        }
        .album-cover {
            width: 200px;
            border-radius: 20px;
            box-shadow: 0 6px 22px rgba(150,110,200,0.3);
            transition: all 0.5s ease;
        }
        .album-card:hover .album-cover {
            transform: scale(1.08) rotate(3deg);
            box-shadow: 0 12px 35px rgba(150,110,200,0.45);
        }
        .album-info {
            flex: 1;
            min-width: 280px;
        }
        .album-name {
            font-size: 26px;
            color: var(--main-purple);
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }
        .album-card:hover .album-name {
            letter-spacing: 2px;
        }
        .album-tips {
            color: #9977aa;
            font-size: 15px;
            margin-bottom: 25px;
        }
        .btn-group {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
        }
        .mv-btn {
            padding: 13px 30px;
            background:linear-gradient(135deg, rgba(230,122,255,0.3), rgba(180,100,255,0.3));
            backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.45);
            color:#fff;
            border-radius: 16px;
            text-decoration:none;
            font-weight:550;
            letter-spacing:1.5px;
            box-shadow: 0 5px 20px rgba(180,100,255,0.25);
            transition: all 0.4s ease;
        }
        .mv-btn:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 10px 30px rgba(180,100,255,0.38);
        }
        .card-btn {
            padding: 13px 30px;
            background:linear-gradient(135deg, rgba(184,148,232,0.35), rgba(200,160,245,0.35));
            backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.45);
            color:#fff;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            font-weight:550;
            letter-spacing:1.5px;
            box-shadow: 0 5px 20px rgba(180,100,255,0.25);
            transition: all 0.4s ease;
        }
        .card-btn:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 10px 30px rgba(180,100,255,0.38);
        }
        .fold-txt {
            color: var(--light-purple);
            font-size: 15px;
            line-height: 46px;
            transition: 0.3s ease;
            cursor: pointer;
        }
        .song-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.8s ease-in-out, padding 0.5s ease;
            padding: 0;
            margin-top: 0;
            border-top: none;
        }
        .song-list.active {
            max-height: 2000px;
            padding-top: 40px;
            margin-top: 30px;
            border-top: 1px dashed rgba(180,140,220,0.45);
        }
        .song-item {
            padding: 25px;
            background: rgba(255,255,255,0.18);
            border-radius: 22px;
            margin-bottom: 20px;
            transition: all 0.4s ease;
            animation: songFade 0.6s ease forwards;
        }
        .song-item:hover {
            background: rgba(255,255,255,0.3);
            transform: translateX(8px);
        }
        @keyframes songFade {
            from{opacity:0;transform: translateY(20px);}
            to{opacity:1;transform: translateY(0);}
        }
        .song-name {
            color: var(--main-purple);
            margin-bottom: 18px;
            font-size: 20px;
            font-weight: 500;
        }
        .custom-audio {
            width: 100%;
            background: linear-gradient(135deg, rgba(248,216,240,0.75), rgba(224,200,255,0.75));
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 22px 28px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            box-shadow: 0 5px 18px rgba(170,130,210,0.25);
            border: 1px solid rgba(255,255,255,0.4);
            position: relative;
        }
        .custom-audio::before{
            content:"";
            position:absolute;
            inset:0;
            border-radius:30px;
            box-shadow: 0 0 20px rgba(184,148,232,0.35);
            animation: breathe 3s ease-in-out infinite;
        }
        @keyframes breathe{
            0%,100%{opacity:0.5;}
            50%{opacity:0.9;}
        }
        .player-top {
            display: flex;
            align-items: center;
            gap: 18px;
            position: relative;
            z-index:2;
        }
        .play-btn {
            background: linear-gradient(135deg, #c7a0f0, #b894e8);
            border: none;
            color: #fff;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(184,148,232,0.45);
            transition: all 0.4s ease;
        }
        .play-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 6px 22px rgba(184,148,232,0.55);
        }
        .progress-wrap {
            flex: 1;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.55);
            border-radius: 12px;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            height: 8px;
            background: linear-gradient(90deg, #e8a8e0, #b894e8);
            border-radius: 12px;
            width: 0%;
            transition: width 0.1s linear;
        }
        .time-text {
            color: var(--main-purple);
            font-size: 14px;
            margin-top: 10px;
            text-align: right;
            font-weight: 500;
        }
        .player-controls {
            display: flex;
            justify-content: flex-end;
            gap: 18px;
            align-items: center;
            position: relative;
            z-index:2;
        }
        .speed-select {
            background:rgba(255,255,255,0.45);
            border:1px solid rgba(255,255,255,0.55);
            color:var(--main-purple);
            border-radius:12px;
            padding:8px 12px;
            outline:none;
            font-size:14px;
            cursor: pointer;
        }
        .down-btn {
            background:linear-gradient(135deg, rgba(198,165,240,0.55), rgba(184,148,232,0.55));
            border:none;
            color:#fff;
            padding:8px 18px;
            border-radius:12px;
            cursor:pointer;
            font-size:14px;
            text-decoration: none;
            transition: all 0.4s ease;
            font-weight: 500;
        }
        .down-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 5px 15px rgba(184,148,232,0.4);
        }
        .card-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card-popup {
            background: var(--glass-deep);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 10px 50px rgba(150,110,200,0.3);
            animation: popShow 0.4s ease;
        }
        @keyframes popShow {
            from{opacity:0;transform: scale(0.9);}
            to{opacity:1;transform: scale(1);}
        }
        .card-title {
            text-align: center;
            font-size: 22px;
            color: var(--main-purple);
            margin-bottom: 25px;
            font-weight: 600;
        }
        .card-img-box {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card-img {
            width: 180px;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(150,110,200,0.25);
            transition: 0.3s ease;
        }
        .card-img:hover {
            transform: translateY(-5px);
        }
        .close-card {
            display: block;
            width: 120px;
            margin: 30px auto 0;
            text-align: center;
            line-height: 40px;
            background:linear-gradient(135deg, #c7a0f0, #b894e8);
            color: #fff;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
        }
        @media (max-width: 768px) {
            nav a {
                margin: 0 10px;
                font-size: 15px;
            }
            .main-wrap {
                margin: 120px auto 60px;
            }
            h1 {
                font-size: 34px;
            }
            .album-inner {
                flex-direction: column;
                text-align: center;
                gap: 25px;
            }
            .album-card {
                padding: 25px 20px;
            }
            .album-cover {
                width: 160px;
            }
            .album-name {
                font-size: 22px;
            }
            .btn-group {
                justify-content: center;
            }
            .custom-audio {
                padding: 18px 15px;
            }
            .play-btn {
                width: 40px;
                height: 40px;
                font-size: 17px;
            }
            .card-img {
                width: 140px;
            }
        }
    </style>
</head>

    </div>

<script>
let currentAudio = null;
let currentBtn = null;

const mainNav = document.getElementById('mainNav');
let lastScrollY = 0;
window.addEventListener('scroll', () => {
    let currentScrollY = window.scrollY;
    if (currentScrollY > lastScrollY && currentScrollY > 50) {
        mainNav.classList.add('nav-hide');
    } else {
        mainNav.classList.remove('nav-hide');
    }
    lastScrollY = currentScrollY;
});

function openCardPopup(){
    document.getElementById('cardMask').style.display = 'flex';
}
function closeCardPopup(){
    document.getElementById('cardMask').style.display = 'none';
}
document.getElementById('cardMask').addEventListener('click',function(e){
    if(e.target === this) closeCardPopup();
})

function toggleAlbum(e,el){
    e.stopPropagation();
    let parentCard = el.closest('.album-card');
    let list = parentCard.querySelector('.song-list');
    list.classList.toggle('active');
    el.innerText = list.classList.contains('active') ? '点击收起曲目列表 ▲' : '点击展开曲目列表 ▼';
}

function formatTime(s){
    if(isNaN(s)) return "00:00";
    let m = Math.floor(s / 60);
    let sec = Math.floor(s % 60);
    return (m<10?'0'+m:m) + ':' + (sec<10?'0'+sec:sec);
}

document.querySelectorAll('.play-btn').forEach(btn=>{
    const audio = new Audio();
    const wrap = btn.closest('.custom-audio');
    const bar = wrap.querySelector('.progress-bar');
    const fill = wrap.querySelector('.progress-fill');
    const timeTxt = wrap.querySelector('.time-text');
    const speedSel = wrap.querySelector('.speed-select');
    let playing = false;

    speedSel.onchange = () => {
        audio.playbackRate = parseFloat(speedSel.value);
    };

    btn.onclick = (e) => {
        e.stopPropagation();
        
        if(currentAudio && currentAudio !== audio){
            currentAudio.pause();
            if(currentBtn) currentBtn.innerText = '▶';
        }

        if(!playing){
            audio.src = btn.dataset.src;
            audio.playbackRate = parseFloat(speedSel.value);
            audio.play();
            btn.innerText = '■';
            playing = true;
            currentAudio = audio;
            currentBtn = btn;
        }else{
            audio.pause();
            btn.innerText = '▶';
            playing = false;
            currentAudio = null;
            currentBtn = null;
        }
    };

    audio.ontimeupdate = () => {
        const per = (audio.currentTime / audio.duration) * 100 || 0;
        fill.style.width = per + '%';
        timeTxt.innerText = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
    };

    bar.onclick = (e) => {
        e.stopPropagation();
        if(!audio.duration) return;
        const rect = bar.getBoundingClientRect();
        const per = (e.clientX - rect.left) / rect.width;
        audio.currentTime = per * audio.duration;
    };

    audio.onended = () => {
        btn.innerText = '▶';
        playing = false;
        fill.style.width = '0%';
        currentAudio = null;
        currentBtn = null;
    };
});
</script>
</body>
</html>
