<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoxSom | 艺人聊天室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        body {
            opacity: 0;
            animation: fadeIn 1.2s ease forwards;
            background: linear-gradient(135deg, #ffcfe8 0%, #e0c8ff 50%, #f8d8f0 100%);
            min-height: 100vh;
            background-attachment: fixed;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255,255,255,0.3) 0%, transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(230,210,255,0.4) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(245,220,250,0.35) 0%, transparent 50%),
                linear-gradient(135deg, #ffcfe8 0%, #e0c8ff 100%);
            overflow-x: hidden;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        nav {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(8px);
            box-shadow: 0 2px 15px rgba(180,140,220,0.2);
            position: sticky;
            top: 0;
            z-index: 999;
        }

        nav a {
            color: #7a4b8e;
            text-decoration: none;
            margin: 0 18px;
            font-size: 17px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        nav a:hover {
            color: #b878c9;
            text-shadow: 0 0 8px rgba(210,160,240,0.6);
            letter-spacing: 2px;
        }

        /* 泡泡布局：侧边 + 聊天区 */
        .bubble-wrap {
            display: flex;
            width: 94%;
            max-width: 1100px;
            margin: 30px auto;
            border-radius: 24px;
            overflow: hidden;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 8px 32px rgba(190,150,230,0.25);
        }

        /* 侧边艺人列表 */
        .side-bar {
            width: 260px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            padding: 20px 0;
            border-right: 1px solid rgba(255,255,255,0.3);
        }

        .side-title {
            text-align: center;
            font-size: 18px;
            color: #7a4b8e;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .artist-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            cursor: pointer;
            transition: 0.3s;
            color: #7a4b8e;
        }

        .artist-item:hover, .artist-item.active {
            background: rgba(255,255,255,0.25);
        }

        .artist-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 12px;
            border: 2px solid rgba(255,255,255,0.5);
        }

        .artist-name {
            font-size: 16px;
            font-weight: 500;
        }

        /* 主聊天区 */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 680px;
        }

        .chat-header {
            padding: 15px 20px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255,255,255,0.3);
            font-size: 18px;
            color: #7a4b8e;
            letter-spacing: 2px;
        }

        .chat-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* 聊天气泡 */
        .msg {
            margin-bottom: 18px;
            display: flex;
            align-items: flex-end;
        }

        .msg.artist {
            justify-content: flex-start;
        }

        .msg.user {
            justify-content: flex-end;
        }

        .msg-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            color: #fff;
            word-wrap: break-word;
        }

        .msg.artist .msg-bubble {
            background: rgba(180,140,220,0.7);
            border-bottom-left-radius: 4px;
        }

        .msg.user .msg-bubble {
            background: rgba(230,180,210,0.7);
            border-bottom-right-radius: 4px;
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 8px;
        }

        /* 输入框 */
        .input-area {
            display: flex;
            padding: 15px 20px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255,255,255,0.3);
        }

        #msg-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 24px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(6px);
            color: #7a4b8e;
            font-size: 15px;
        }

        #send-btn {
            margin-left: 12px;
            padding: 12px 20px;
            border-radius: 24px;
            border: none;
            background: rgba(180,140,220,0.7);
            color: #fff;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        #send-btn:hover {
            background: rgba(180,140,220,0.9);
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .bubble-wrap {
                flex-direction: column;
            }
            .side-bar {
                width: 100%;
                display: flex;
                overflow-x: auto;
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,0.3);
            }
            .artist-item {
                flex-shrink: 0;
            }
            .chat-area {
                height: 500px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">首页</a>
        <a href="notice.html">公告</a>
        <a href="member.html">艺人动态</a>
        <a href="work.html">作品</a>
    </nav>

    <div class="bubble-wrap">
        <!-- 侧边艺人列表 -->
        <div class="side-bar">
            <div class="side-title">艺人聊天室</div>
            <div class="artist-item active" data-id="1">
                <img class="artist-avatar" src="https://github.com/NoxSom/NoxSom.github.io/blob/c37f65f6323a26370557aa5a824e86ea3e6f080d/retouch_2026051218355885.jpg?raw=true">
                <span class="artist-name">白星晚 Elara</span>
            </div>
            <div class="artist-item" data-id="2">
                <img class="artist-avatar" src="https://github.com/NoxSom/NoxSom.github.io/blob/c37f65f6323a26370557aa5a824e86ea3e6f080d/IMG_20260512_170356.jpg?raw=true">
                <span class="artist-name">河恩舒 Iris</span>
            </div>
            <div class="artist-item" data-id="3">
                <img class="artist-avatar" src="https://github.com/NoxSom/NoxSom.github.io/blob/c37f65f6323a26370557aa5a824e86ea3e6f080d/mmexport1778578111420.jpg?raw=true">
                <span class="artist-name">金素兰 Luna</span>
            </div>
            <div class="artist-item" data-id="4">
                <img class="artist-avatar" src="https://github.com/NoxSom/NoxSom.github.io/blob/c37f65f6323a26370557aa5a824e86ea3e6f080d/retouch_2026051219031188.jpg?raw=true">
                <span class="artist-name">彩夏允 Zoe</span>
            </div>
        </div>

        <!-- 主聊天区 -->
        <div class="chat-area">
            <div class="chat-header" id="chat-header">白星晚 Elara · 聊天室</div>
            <div class="chat-content" id="chat-content"></div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="发送消息...">
                <button id="send-btn">发送</button>
            </div>
        </div>
    </div>

<script>
document.oncontextmenu = function(){return false;}
document.onselectstart = function(){return false;}

// 艺人资料
const artists = {
    1: {
        name: "白星晚 Elara",
        avatar: "https://github.com/NoxSom/NoxSom.github.io/blob/c37f65f6323a26370557aa5a824e86ea3e6f080d/retouch_2026051218355885.jpg?raw=true",
        // AI 人设回复库（自然、无AI感）
        replies: [
            "今天练习好累，但看到你的消息就很开心✨",
            "最近在准备新曲，希望你会喜欢～",
            "要好好吃饭、好好休息哦💜",
            "梦到我们在舞台上见面了🌙",
            "谢谢你一直陪着我，晚安🌙"
        ]
    },
    2: {
        name: "河恩舒 Iris",
        avatar: "https://github.com/NoxSom/NoxSom.github.io/blob/c37f65f6323a26370557aa5a824e86ea3e6f080d/IMG_20260512_170356.jpg?raw=true",
        replies: [
            "Hi～今天过得怎么样？🌸",
            "韩语/英语都可以跟我聊哦～",
            "练习室的阳光很好，想起你了☀️",
            "喜欢听的歌可以推荐给我🎵",
            "今天也谢谢你，做个好梦🌙"
        ]
    },
    3: {
        name: "金素兰 Luna",
        avatar: "https://github.com/NoxSom/NoxSom.github.io/blob/c37f65f6323a26370557aa5a824e86ea3e6f080d/mmexport1778578111420.jpg?raw=true",
        replies: [
            "Yo～今天也很酷吧😎",
            "写了新的rap，下次唱给你听",
            "别太辛苦，放松一下吧🎧",
            "你懂我～这种感觉很好",
            "今晚也做个自由的梦✨"
        ]
    },
    4: {
        name: "彩夏允 Zoe",
        avatar: "https://github.com/NoxSom/NoxSom.github.io/blob/c37f65f6323a26370557aa5a824e86ea3e6f080d/retouch_2026051219031188.jpg?raw=true",
        replies: [
            "跳舞超开心！今天也活力满满💃",
            "欧尼们都很照顾我～",
            "日语/韩语都可以聊哦🍡",
            "你也要一直开心下去呀💖",
            "晚安～明天也要见面哦🌙"
        ]
    }
};

let currentId = 1;
const chatContent = document.getElementById("chat-content");
const chatHeader = document.getElementById("chat-header");
const msgInput = document.getElementById("msg-input");
const sendBtn = document.getElementById("send-btn");
const artistItems = document.querySelectorAll(".artist-item");

// 切换艺人
artistItems.forEach(item => {
    item.addEventListener("click", () => {
        artistItems.forEach(i => i.classList.remove("active"));
        item.classList.add("active");
        currentId = item.getAttribute("data-id");
        chatHeader.innerText = `${artists[currentId].name} · 聊天室`;
        // 清空聊天记录（可保留）
        chatContent.innerHTML = "";
        // 自动发一条艺人开场
        addMsg("artist", artists[currentId].replies[0], artists[currentId].avatar);
    });
});

// 发送消息
function sendMsg() {
    const text = msgInput.value.trim();
    if (!text) return;
    // 用户气泡
    addMsg("user", text, "");
    msgInput.value = "";
    // AI 随机回复（无延迟或短延迟，像真人）
    setTimeout(() => {
        const r = artists[currentId].replies;
        const reply = r[Math.floor(Math.random() * r.length)];
        addMsg("artist", reply, artists[currentId].avatar);
    }, 800 + Math.random() * 700); // 0.8-1.5秒，自然
}

// 添加气泡
function addMsg(role, text, avatar) {
    const msg = document.createElement("div");
    msg.className = `msg ${role}`;
    if (role === "artist") {
        msg.innerHTML = `
            <img class="msg-avatar" src="${avatar}">
            <div class="msg-bubble">${text}</div>
        `;
    } else {
        msg.innerHTML = `<div class="msg-bubble">${text}</div>`;
    }
    chatContent.appendChild(msg);
    // 自动滚动到底
    chatContent.scrollTop = chatContent.scrollHeight;
}

sendBtn.addEventListener("click", sendMsg);
msgInput.addEventListener("keydown", e => {
    if (e.key === "Enter") sendMsg();
});

// 默认第一条消息
addMsg("artist", artists[currentId].replies[0], artists[currentId].avatar);
</script>
</body>
</html>
