<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NoxSom | 艺人聊天室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        body {
            opacity: 0;
            animation: fadeIn 1.2s ease forwards;
            background: linear-gradient(135deg, #ffcfe8 0%, #e0c8ff 50%, #f8d8f0 100%);
            min-height: 100vh;
            background-attachment: fixed;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255,255,255,0.3) 0%, transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(230,210,255,0.4) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(245,220,250,0.35) 0%, transparent 50%),
                linear-gradient(135deg, #ffcfe8 0%, #e0c8ff 100%);
            overflow-x: hidden;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* 导航栏优化 */
        nav {
            width: 100%;
            padding: 18px 0;
            text-align: center;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(180,140,220,0.15);
            position: sticky;
            top: 0;
            z-index: 999;
        }

        nav a {
            color: #704085;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        nav a:hover {
            color: #b878c9;
            text-shadow: 0 0 10px rgba(210,160,240,0.7);
            letter-spacing: 1.5px;
        }

        /* 整体聊天容器 原创圆角磨砂 */
        .chat-container {
            width: 92%;
            max-width: 1200px;
            margin: 25px auto;
            border-radius: 30px;
            overflow: hidden;
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.45);
            box-shadow: 0 10px 40px rgba(170,130,210,0.2);
            display: flex;
        }

        /* 侧边艺人列表 全新设计 */
        .artist-sidebar {
            width: 280px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            padding: 25px 0;
            border-right: 1px solid rgba(255,255,255,0.25);
        }

        .sidebar-title {
            text-align: center;
            font-size: 19px;
            color: #704085;
            margin-bottom: 25px;
            letter-spacing: 3px;
            font-weight: 600;
        }

        .artist-item {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            margin: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.35s ease;
            color: #704085;
        }

        .artist-item:hover,
        .artist-item.active {
            background: rgba(255,255,255,0.28);
            box-shadow: 0 4px 15px rgba(180,140,220,0.2);
            transform: translateX(3px);
        }

        .artist-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 15px;
            border: 2px solid rgba(255,255,255,0.55);
        }

        .artist-name {
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* 聊天主区域 */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 720px;
        }

        .chat-top-bar {
            padding: 18px 25px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.25);
            font-size: 19px;
            color: #704085;
            letter-spacing: 2px;
            font-weight: 500;
        }

        .chat-content-wrap {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #c9a8e0 transparent;
        }

        .chat-content-wrap::-webkit-scrollbar {
            width: 6px;
        }
        .chat-content-wrap::-webkit-scrollbar-thumb {
            background: #c9a8e0;
            border-radius: 10px;
        }

        /* 聊天气泡 全新圆角高级设计 */
        .msg-row {
            margin-bottom: 22px;
            display: flex;
            align-items: flex-end;
        }

        .msg-role-artist {
            justify-content: flex-start;
        }
        .msg-role-user {
            justify-content: flex-end;
        }

        .msg-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 12px;
            border: 2px solid rgba(255,255,255,0.5);
        }

        .msg-bubble {
            max-width: 72%;
            padding: 14px 18px;
            border-radius: 22px;
            font-size: 15px;
            line-height: 1.7;
            color: #fff;
            word-wrap: break-word;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
        }

        .msg-role-artist .msg-bubble {
            background: linear-gradient(135deg, #b898e0, #a078d0);
            border-bottom-left-radius: 6px;
        }

        .msg-role-user .msg-bubble {
            background: linear-gradient(135deg, #f0b8d8, #e8a0c8);
            border-bottom-right-radius: 6px;
        }

        /* 输入栏全新设计 */
        .chat-input-bar {
            display: flex;
            align-items: center;
            padding: 20px 25px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.25);
            gap: 15px;
        }

        #chat-input {
            flex: 1;
            padding: 14px 22px;
            border-radius: 30px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.35);
            backdrop-filter: blur(8px);
            color: #704085;
            font-size: 15px;
            box-shadow: inset 0 2px 8px rgba(180,140,220,0.15);
        }

        #send-chat-btn {
            padding: 14px 28px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #b898e0, #a078d0);
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(180,140,220,0.25);
        }

        #send-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(180,140,220,0.35);
        }

        /* 移动端全局完美适配 */
        @media (max-width: 768px) {
            .chat-container {
                flex-direction: column;
                width: 95%;
                margin: 15px auto;
                border-radius: 24px;
            }

            .artist-sidebar {
                width: 100%;
                display: flex;
                overflow-x: auto;
                padding: 15px 10px;
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,0.25);
            }

            .sidebar-title {
                display: none;
            }

            .artist-item {
                flex-shrink: 0;
                margin: 0 8px;
                padding: 10px 15px;
            }

            .artist-avatar {
                width: 44px;
                height: 44px;
                margin-right: 10px;
            }

            .artist-name {
                font-size: 14px;
            }

            .chat-main {
                height: calc(100vh - 260px);
            }

            .chat-top-bar {
                padding: 15px 20px;
                font-size: 17px;
            }

            .chat-content-wrap {
                padding: 18px 15px;
            }

            .msg-bubble {
                max-width: 80%;
                padding: 12px 16px;
                font-size: 14px;
            }

            .chat-input-bar {
                padding: 15px 18px;
            }

            #chat-input {
                padding: 12px 18px;
                font-size: 14px;
            }

            #send-chat-btn {
                padding: 12px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">首页</a>
        <a href="notice.html">公告</a>
        <a href="member.html">艺人动态</a>
        <a href="work.html">作品</a>
    </nav>

    <div class="chat-container">
        <!-- 侧边艺人列表 -->
        <div class="artist-sidebar">
            <div class="sidebar-title">艺人梦境聊天室</div>
            <div class="artist-item active" data-id="1">
                <img class="artist-avatar" src="https://raw.githubusercontent.com/NoxSom/NoxSom.github.io/c37f65f6323a26370557aa5a824e86ea3e6f080d/retouch_2026051218355885.jpg">
                <span class="artist-name">白星晚 Elara</span>
            </div>
            <div class="artist-item" data-id="2">
                <img class="artist-avatar" src="https://raw.githubusercontent.com/NoxSom/NoxSom.github.io/c37f65f6323a26370557aa5a824e86ea3e6f080d/IMG_20260512_170356.jpg">
                <span class="artist-name">河恩舒 Iris</span>
            </div>
            <div class="artist-item" data-id="3">
                <img class="artist-avatar" src="https://raw.githubusercontent.com/NoxSom/NoxSom.github.io/c37f65f6323a26370557aa5a824e86ea3e6f080d/mmexport1778578111420.jpg">
                <span class="artist-name">金素兰 Luna</span>
            </div>
            <div class="artist-item" data-id="4">
                <img class="artist-avatar" src="https://raw.githubusercontent.com/NoxSom/NoxSom.github.io/c37f65f6323a26370557aa5a824e86ea3e6f080d/retouch_2026051219031188.jpg">
                <span class="artist-name">彩夏允 Zoe</span>
            </div>
        </div>

        <!-- 聊天主区域 -->
        <div class="chat-main">
            <div class="chat-top-bar" id="chatTopBar">白星晚 Elara · 梦境聊天室</div>
            <div class="chat-content-wrap" id="chatContent"></div>
            <div class="chat-input-bar">
                <input type="text" id="chat-input" placeholder="向艺人发送消息...">
                <button id="send-chat-btn">发送</button>
            </div>
        </div>
    </div>

<script>
document.oncontextmenu = function(){return false;}
document.onselectstart = function(){return false;}

// 艺人资料 高速头像链接
const artists = {
    1: {
        name: "白星晚 Elara",
        avatar: "https://raw.githubusercontent.com/NoxSom/NoxSom.github.io/c37f65f6323a26370557aa5a824e86ea3e6f080d/retouch_2026051218355885.jpg",
        replies: [
            "今天练习好累，但看到你的消息就很开心✨",
            "最近在准备新曲，希望你会喜欢～",
            "要好好吃饭、好好休息哦💜",
            "梦到我们在舞台上见面了🌙",
            "谢谢你一直陪着我，晚安🌙"
        ]
    },
    2: {
        name: "河恩舒 Iris",
        avatar: "https://raw.githubusercontent.com/NoxSom/NoxSom.github.io/c37f65f6323a26370557aa5a824e86ea3e6f080d/IMG_20260512_170356.jpg",
        replies: [
            "Hi～今天过得怎么样？🌸",
            "韩语/英语都可以跟我聊哦～",
            "练习室的阳光很好，想起你了☀️",
            "喜欢听的歌可以推荐给我🎵",
            "今天也谢谢你，做个好梦🌙"
        ]
    },
    3: {
        name: "金素兰 Luna",
        avatar: "https://raw.githubusercontent.com/NoxSom/NoxSom.github.io/c37f65f6323a26370557aa5a824e86ea3e6f080d/mmexport1778578111420.jpg",
        replies: [
            "Yo～今天也很酷吧😎",
            "写了新的rap，下次唱给你听",
            "别太辛苦，放松一下吧🎧",
            "你懂我～这种感觉很好",
            "今晚也做个自由的梦✨"
        ]
    },
    4: {
        name: "彩夏允 Zoe",
        avatar: "https://raw.githubusercontent.com/NoxSom/NoxSom.github.io/c37f65f6323a26370557aa5a824e86ea3e6f080d/retouch_2026051219031188.jpg",
        replies: [
            "跳舞超开心！今天也活力满满💃",
            "欧尼们都很照顾我～",
            "日语/韩语都可以聊哦🍡",
            "你也要一直开心下去呀💖",
            "晚安～明天也要见面哦🌙"
        ]
    }
};

let currentId = 1;
const chatContent = document.getElementById("chatContent");
const chatTopBar = document.getElementById("chatTopBar");
const chatInput = document.getElementById("chat-input");
const sendBtn = document.getElementById("send-chat-btn");
const artistItems = document.querySelectorAll(".artist-item");

// 切换艺人
artistItems.forEach(item => {
    item.addEventListener("click", () => {
        artistItems.forEach(i => i.classList.remove("active"));
        item.classList.add("active");
        currentId = item.getAttribute("data-id");
        chatTopBar.innerText = `${artists[currentId].name} · 梦境聊天室`;
        chatContent.innerHTML = "";
        addChatMsg("artist", artists[currentId].replies[0], artists[currentId].avatar);
    });
});

// 发送消息逻辑
function sendChat() {
    const text = chatInput.value.trim();
    if (!text) return;
    addChatMsg("user", text, "");
    chatInput.value = "";
    // 模拟真人延迟回复
    setTimeout(() => {
        const replyList = artists[currentId].replies;
        const randomReply = replyList[Math.floor(Math.random() * replyList.length)];
        addChatMsg("artist", randomReply, artists[currentId].avatar);
    }, 800 + Math.random() * 600);
}

// 插入聊天气泡
function addChatMsg(role, text, avatar) {
    const msgWrap = document.createElement("div");
    msgWrap.className = `msg-row msg-role-${role}`;
    if (role === "artist") {
        msgWrap.innerHTML = `
            <img class="msg-avatar" src="${avatar}">
            <div class="msg-bubble">${text}</div>
        `;
    } else {
        msgWrap.innerHTML = `<div class="msg-bubble">${text}</div>`;
    }
    chatContent.appendChild(msgWrap);
    chatContent.scrollTop = chatContent.scrollHeight;
}

sendBtn.addEventListener("click", sendChat);
chatInput.addEventListener("keydown", e => {
    if (e.key === "Enter") sendChat();
});

// 默认初始消息
addChatMsg("artist", artists[currentId].replies[0], artists[currentId].avatar);
</script>
</body>
</html>
